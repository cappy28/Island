<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏝️ Île 3D Interactive — Babylon.js</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #071428; font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; }
    #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; outline: none; }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    #title-card { position: absolute; top: 22px; left: 26px; }
    #title-card h1 { font-size: 26px; font-weight: 700; color: #fff; text-shadow: 0 2px 14px rgba(0,0,0,0.7); letter-spacing: 0.5px; }
    #title-card p  { font-size: 11px; color: rgba(255,255,255,0.50); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; }

    #clock { position: absolute; top: 22px; right: 26px; background: rgba(0,0,0,0.32); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.13); border-radius: 14px; padding: 10px 18px; text-align: center; min-width: 110px; }
    #clock-phase { font-size: 22px; display: block; margin-bottom: 2px; }
    #clock-time  { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 2px; }

    #hint { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.28); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.10); border-radius: 30px; padding: 8px 22px; color: rgba(255,255,255,0.55); font-size: 11px; letter-spacing: 1px; white-space: nowrap; }

    /* Son toggle */
    #sound-btn { position: absolute; bottom: 18px; right: 26px; pointer-events: all; background: rgba(0,0,0,0.32); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.13); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: background .2s; }
    #sound-btn:hover { background: rgba(255,255,255,0.12); }

    #loading { position: fixed; inset: 0; background: #071428; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: opacity 0.9s ease; }
    #loading h2 { font-size: 36px; color: #fff; text-shadow: 0 0 30px rgba(80,180,255,0.5); margin-bottom: 14px; }
    #loading p  { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 2px; }
    #loading-sub { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; margin-top: 8px; }
    .bar-track { width: 220px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 3px; margin-top: 22px; overflow: hidden; }
    .bar-fill  { height: 100%; background: linear-gradient(90deg,#3a9ff5,#7ddcf7); border-radius: 3px; width: 0; transition: width 0.4s ease; }
  </style>
</head>
<body>

<div id="loading">
  <h2>🏝️ Île 3D</h2>
  <p>CHARGEMENT DE L'ÎLE…</p>
  <p id="loading-sub">Initialisation…</p>
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
</div>

<canvas id="renderCanvas" tabindex="0"></canvas>

<div id="hud">
  <div id="title-card">
    <h1>🏝️ Île 3D</h1>
    <p>Exploration libre</p>
  </div>
  <div id="clock">
    <span id="clock-phase">🌤️</span>
    <span id="clock-time">--:--</span>
  </div>
  <div id="hint">🖱️ Clic + Glisser &nbsp;·&nbsp; Molette Zoom &nbsp;·&nbsp; Clic droit Pan</div>
  <div id="sound-btn" title="Son on/off">🔊</div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>
"use strict";

// ══════════════════════════════════════════════════════════════
// PROGRESS BAR
// ══════════════════════════════════════════════════════════════
const bar = document.getElementById("bar");
const sub = document.getElementById("loading-sub");
let _prog = 0;
const setProgress = (pct, label) => {
  if (pct !== null) _prog = Math.max(_prog, pct);
  bar.style.width = _prog + "%";
  if (label) sub.textContent = label;
};
setProgress(5, "Moteur WebGL…");

// ══════════════════════════════════════════════════════════════
// ENGINE
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true, {
  preserveDrawingBuffer: true, stencil: true, antialias: true
});

// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const CFG = {
  ISLAND_R  : 22,
  WATER_Y   : -0.55,   // eau bien en dessous du sable
  SAND_Y    : 0.0,
  SHADOW_SZ : 1024,
  // Anneau d'eau : commence après le bord de l'île
  WATER_INNER : 23,    // rayon intérieur (juste après la plage)
  WATER_OUTER : 450,   // rayon extérieur (horizon)

  TREES : [
    [-14,-8],[-16,2],[-13,10],[-8,16],[2,18],[10,15],
    [16,6],[17,-4],[13,-12],[5,-17],[-5,-18],[-12,-13],
    [-18,8],[18,8],[-9,-7],[9,-7],[-7,9],[7,9],
    [-15,-3],[15,-3]
  ],
  ROCKS : [
    {x:18,z:5,s:1.1},{x:-17,z:7,s:1.4},{x:7,z:19,s:0.8},
    {x:-9,z:-18,s:1.2},{x:15,z:-11,s:0.9},{x:-19,z:-4,s:1.0},
    {x:11,z:16,s:0.7},{x:-14,z:14,s:0.6},{x:19,z:-8,s:1.3}
  ]
};

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const C3 = (r,g,b)   => new BABYLON.Color3(r,g,b);
const C4 = (r,g,b,a) => new BABYLON.Color4(r,g,b,a??1);
const lerpN = (a,b,t) => a+(b-a)*t;
const lerpC = (a,b,t) => C3(lerpN(a.r,b.r,t),lerpN(a.g,b.g,t),lerpN(a.b,b.b,t));

// ══════════════════════════════════════════════════════════════
// PALETTES JOUR/NUIT
// ══════════════════════════════════════════════════════════════
const PAL = {
  night : { sky:C3(.01,.02,.08), sun:C3(.07,.11,.28), amb:C3(.04,.05,.12), fog:C3(.01,.02,.06), si:.04, ai:.07 },
  dawn  : { sky:C3(.85,.45,.20), sun:C3(1.0,.60,.20), amb:C3(.36,.26,.20), fog:C3(.80,.50,.30), si:.5,  ai:.28 },
  day   : { sky:C3(.36,.61,1.0), sun:C3(1.0,.96,.82), amb:C3(.44,.50,.60), fog:C3(.62,.82,1.0), si:1.1, ai:.55 },
  dusk  : { sky:C3(.90,.40,.10), sun:C3(1.0,.45,.10), amb:C3(.35,.20,.15), fog:C3(.85,.45,.25), si:.38, ai:.20 }
};
const lerpPal = (a,b,t) => ({
  sky:lerpC(a.sky,b.sky,t), sun:lerpC(a.sun,b.sun,t),
  amb:lerpC(a.amb,b.amb,t), fog:lerpC(a.fog,b.fog,t),
  si:lerpN(a.si,b.si,t),    ai:lerpN(a.ai,b.ai,t)
});

// ══════════════════════════════════════════════════════════════
// HAUTEUR TERRAIN
// ══════════════════════════════════════════════════════════════
const getH = (x, z) => {
  const d = Math.sqrt(x*x + z*z);
  const n = d / CFG.ISLAND_R;
  if (n >= 1.0) return CFG.WATER_Y - 0.5;

  let h;
  if (n < 0.45) {
    h = 0.12 + Math.sin(x*.3)*Math.cos(z*.3)*.08;
  } else {
    const t = (n - 0.45) / 0.55;
    h = lerpN(0.12, CFG.SAND_Y + 0.04, Math.pow(t, 0.65));
    h += Math.sin(x*.65)*Math.cos(z*.55)*.25*(1-n);
    h += Math.sin(x*1.3+.7)*Math.cos(z*1.2)*.15*(1-n);
  }
  // Plage plate en bordure
  if (n > .84) h = lerpN(h, CFG.SAND_Y + 0.04, (n-.84)/.16);
  return Math.max(CFG.SAND_Y + 0.02, h);
};

// ══════════════════════════════════════════════════════════════
// SCÈNE
// ══════════════════════════════════════════════════════════════
setProgress(10, "Scène…");
const scene = new BABYLON.Scene(engine);
scene.clearColor = C4(.36,.61,1,1);
scene.fogMode    = BABYLON.Scene.FOGMODE_EXP2;
scene.fogDensity = .004;
scene.fogColor   = C3(.62,.82,1);

// ══════════════════════════════════════════════════════════════
// CAMÉRA
// ══════════════════════════════════════════════════════════════
const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2.3, Math.PI/4.1, 55, new BABYLON.Vector3(0,2,0), scene);
camera.lowerRadiusLimit     = 8;
camera.upperRadiusLimit     = 130;
camera.lowerBetaLimit       = 0.08;
camera.upperBetaLimit       = Math.PI / 2.08;
camera.wheelDeltaPercentage = 0.018;
camera.panningSensibility   = 80;
camera.attachControl(canvas, true);

// ══════════════════════════════════════════════════════════════
// LUMIÈRES
// ══════════════════════════════════════════════════════════════
const ambLight = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0,1,0), scene);
ambLight.diffuse     = C3(.44,.50,.60);
ambLight.groundColor = C3(.18,.14,.10);
ambLight.intensity   = .55;

const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-1,-2,-1).normalize(), scene);
sun.position  = new BABYLON.Vector3(30,40,30);
sun.intensity = 1.1;
sun.diffuse   = C3(1,.96,.82);
sun.specular  = C3(.5,.45,.3);

const shadow = new BABYLON.ShadowGenerator(CFG.SHADOW_SZ, sun);
shadow.useBlurExponentialShadowMap = true;
shadow.blurKernel = 32;

// ══════════════════════════════════════════════════════════════
// SKYBOX
// ══════════════════════════════════════════════════════════════
setProgress(14, "Ciel…");
const skybox = BABYLON.MeshBuilder.CreateBox("skyBox", {size:900}, scene);
const skyMat = new BABYLON.StandardMaterial("skyMat", scene);
skyMat.backFaceCulling = false;
skyMat.reflectionTexture = new BABYLON.CubeTexture("https://assets.babylonjs.com/textures/skybox", scene);
skyMat.reflectionTexture.coordinatesMode = BABYLON.Texture.SKYBOX_MODE;
skyMat.diffuseColor  = C3(0,0,0);
skyMat.specularColor = C3(0,0,0);
skybox.material = skyMat;
skybox.infiniteDistance = true;

// ══════════════════════════════════════════════════════════════
// MATÉRIAUX
// ══════════════════════════════════════════════════════════════
const _mats = {};
const makeMat = (id, props) => {
  if (_mats[id]) return _mats[id];
  const m = new BABYLON.StandardMaterial(id, scene);
  Object.assign(m, props);
  return (_mats[id] = m);
};

// ══════════════════════════════════════════════════════════════
// TERRAIN ÎLE — SABLE QUI SORT DE L'EAU
// ══════════════════════════════════════════════════════════════
setProgress(18, "Terrain île…");
const islandMesh = BABYLON.MeshBuilder.CreateGround("island", {
  width:90, height:90, subdivisions:88
}, scene);

const vPos = islandMesh.getVerticesData(BABYLON.VertexBuffer.PositionKind);
for (let i = 0; i < vPos.length; i += 3)
  vPos[i+1] = getH(vPos[i], vPos[i+2]);
islandMesh.updateVerticesData(BABYLON.VertexBuffer.PositionKind, vPos);
islandMesh.createNormals(true);

const sandTex = new BABYLON.Texture("https://assets.babylonjs.com/textures/sand.jpg", scene);
sandTex.uScale = 16; sandTex.vScale = 16;
islandMesh.material = makeMat("islandMat", {
  diffuseTexture: sandTex,
  specularColor : C3(.02,.02,.02)
});
islandMesh.receiveShadows = true;

// Dalle béton au centre
const cityBase = BABYLON.MeshBuilder.CreateGround("cityBase", {width:25, height:25, subdivisions:4}, scene);
cityBase.position.y = 0.14;
const concreteMat = new BABYLON.StandardMaterial("concrete", scene);
concreteMat.diffuseColor  = C3(.58,.56,.52);
concreteMat.specularColor = C3(.04,.04,.04);
cityBase.material      = concreteMat;
cityBase.receiveShadows = true;

// ══════════════════════════════════════════════════════════════
// EAU — ANNEAU (tore plat) QUI NE RECOUVRE PAS L'ÎLE
// ══════════════════════════════════════════════════════════════
// On crée un disque creux via CreateDisc avec segments et on
// repose sur un grand plan avec stencil, OU plus simple :
// on utilise CreateGround avec un trou central via vertex masking.
// Solution la plus robuste : créer un plan annulaire custom.
setProgress(28, "Eau…");

// Crée un anneau de vertices (plan troué) autour de l'île
const createWaterRing = (innerR, outerR, segments) => {
  const positions = [];
  const indices   = [];
  const normals   = [];
  const uvs       = [];

  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    const cos   = Math.cos(angle);
    const sin   = Math.sin(angle);

    // vertex extérieur
    positions.push(cos*outerR, 0, sin*outerR);
    normals.push(0,1,0);
    uvs.push(i/segments, 1);

    // vertex intérieur
    positions.push(cos*innerR, 0, sin*innerR);
    normals.push(0,1,0);
    uvs.push(i/segments, 0);
  }

  for (let i = 0; i < segments; i++) {
    const a = i*2, b = a+1, c = a+2, d = a+3;
    indices.push(a,b,c, b,d,c);
  }

  const mesh = new BABYLON.Mesh("waterRing", scene);
  const vd   = new BABYLON.VertexData();
  vd.positions = positions;
  vd.indices   = indices;
  vd.normals   = normals;
  vd.uvs       = uvs;
  vd.applyToMesh(mesh);
  return mesh;
};

const waterMesh = createWaterRing(CFG.WATER_INNER, CFG.WATER_OUTER, 128);
waterMesh.position.y = CFG.WATER_Y;

const waterMat = new BABYLON.WaterMaterial("waterMat", scene, new BABYLON.Vector2(512,512));
waterMat.bumpTexture      = new BABYLON.Texture("https://assets.babylonjs.com/textures/waterbump.png", scene);
waterMat.windForce        = -5;
waterMat.waveHeight       = 0.15;
waterMat.windDirection    = new BABYLON.Vector2(1.2, 0.8);
waterMat.waterColor       = C3(.05,.28,.60);
waterMat.colorBlendFactor = 0.24;
waterMat.bumpHeight       = 0.32;
waterMat.waveLength       = 0.1;
waterMat.waveSpeed        = 1.6;
waterMat.addToRenderList(skybox);
waterMat.addToRenderList(islandMesh);
waterMat.addToRenderList(cityBase);
waterMesh.material = waterMat;

const reflList = [];

// ══════════════════════════════════════════════════════════════
// ROCHERS
// ══════════════════════════════════════════════════════════════
const mRock = makeMat("rock", { diffuseColor:C3(.52,.48,.42), specularColor:C3(.06,.06,.06) });
CFG.ROCKS.forEach(({x,z,s}) => {
  const y = getH(x,z);
  const r = BABYLON.MeshBuilder.CreateSphere("rock", {diameter:s*1.8, segments:4}, scene);
  r.position.set(x, y + s*.25, z);
  r.scaling.set(1,.62,1);
  r.rotation.y = (x*5.1+z*2.7)%(Math.PI*2);
  r.material = mRock;
  r.receiveShadows = true;
  shadow.addShadowCaster(r);
  reflList.push(r);
});

// ══════════════════════════════════════════════════════════════
// SOLEIL / LUNE
// ══════════════════════════════════════════════════════════════
const sunSphere = BABYLON.MeshBuilder.CreateSphere("sunSph", {diameter:2.8}, scene);
const sunSphMat = new BABYLON.StandardMaterial("sunSphMat", scene);
sunSphMat.emissiveColor = C3(1.0,.95,.6); sunSphMat.disableLighting = true;
sunSphere.material = sunSphMat;

const moonSphere = BABYLON.MeshBuilder.CreateSphere("moonSph", {diameter:1.6}, scene);
const moonSphMat = new BABYLON.StandardMaterial("moonSphMat", scene);
moonSphMat.emissiveColor = C3(.88,.88,.98); moonSphMat.disableLighting = true;
moonSphere.material  = moonSphMat;
moonSphere.isVisible = false;

// ══════════════════════════════════════════════════════════════
// PARTICULES
// ══════════════════════════════════════════════════════════════
const birds = new BABYLON.ParticleSystem("birds", 24, scene);
birds.emitter    = new BABYLON.Vector3(0,12,0);
birds.minEmitBox = new BABYLON.Vector3(-16,-4,-16);
birds.maxEmitBox = new BABYLON.Vector3(16,5,16);
birds.color1 = C4(1,1,1,1); birds.color2 = C4(.85,.85,.9,.7); birds.colorDead = C4(1,1,1,0);
birds.minSize = 0.22; birds.maxSize = 0.48;
birds.minLifeTime = 5; birds.maxLifeTime = 10;
birds.emitRate = 2.5;
birds.minEmitPower = 1.5; birds.maxEmitPower = 3.8;
birds.direction1 = new BABYLON.Vector3(-1.8,.3,-1);
birds.direction2 = new BABYLON.Vector3(1.8,.6,1);
birds.gravity    = new BABYLON.Vector3(0,-.04,0);
birds.updateSpeed = 0.008;
birds.start();

const stars = new BABYLON.ParticleSystem("stars", 250, scene);
stars.emitter    = new BABYLON.Vector3(0,0,0);
stars.minEmitBox = new BABYLON.Vector3(-160,65,-160);
stars.maxEmitBox = new BABYLON.Vector3(160,160,160);
stars.color1 = C4(1,1,1,.85); stars.color2 = C4(.9,.9,1,.6); stars.colorDead = C4(1,1,1,0);
stars.minSize = 0.28; stars.maxSize = 0.72;
stars.minLifeTime = 9999; stars.maxLifeTime = 9999;
stars.emitRate = 250;
stars.gravity    = new BABYLON.Vector3(0,0,0);
stars.direction1 = stars.direction2 = new BABYLON.Vector3(0,0,0);
stars.minEmitPower = stars.maxEmitPower = 0;
stars.updateSpeed = .01;
stars.start();

// ══════════════════════════════════════════════════════════════
// CYCLE JOUR/NUIT
// ══════════════════════════════════════════════════════════════
const updateDayNight = () => {
  const now   = new Date();
  const hours = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  const sunAngle = ((hours-6)/24)*Math.PI*2;
  const sR=60, sX=Math.cos(sunAngle)*sR, sY=Math.sin(sunAngle)*sR;
  sun.position.set(sX,sY,35);
  sun.direction = new BABYLON.Vector3(-sX,-sY,-35).normalize();
  sunSphere.position.set(sX*.58,sY*.58,28);
  sunSphere.isVisible  = sY > -8;
  moonSphere.position.set(-sX*.5,-sY*.5,-24);
  moonSphere.isVisible = sY < 8;

  let pal;
  const seg=(h1,h2,p1,p2)=>lerpPal(p1,p2,Math.min(1,Math.max(0,(hours-h1)/(h2-h1))));
  if      (hours<4.5)  pal=PAL.night;
  else if (hours<7.0)  pal=seg(4.5,7.0,PAL.night,PAL.dawn);
  else if (hours<8.5)  pal=seg(7.0,8.5,PAL.dawn,PAL.day);
  else if (hours<17.5) pal=PAL.day;
  else if (hours<19.5) pal=seg(17.5,19.5,PAL.day,PAL.dusk);
  else if (hours<21.0) pal=seg(19.5,21.0,PAL.dusk,PAL.night);
  else                 pal=PAL.night;

  scene.clearColor   = C4(pal.sky.r,pal.sky.g,pal.sky.b,1);
  scene.fogColor     = pal.fog;
  sun.diffuse        = pal.sun;
  sun.intensity      = pal.si;
  ambLight.diffuse   = pal.amb;
  ambLight.intensity = pal.ai;
  sunSphMat.emissiveColor = pal.sun;
  stars.emitRate     = pal.ai < .25 ? 250 : 0;

  // Adapter volume vent selon heure
  if (window._sfx) window._sfx.setDayTime(hours);

  const H=String(now.getHours()).padStart(2,"0"), M=String(now.getMinutes()).padStart(2,"0");
  document.getElementById("clock-time").textContent  = `${H}:${M}`;
  document.getElementById("clock-phase").textContent =
    hours>=6&&hours<8?"🌅":hours>=8&&hours<17?"☀️":hours>=17&&hours<20?"🌇":"🌙";
};
updateDayNight();
setInterval(updateDayNight, 4000);

// ══════════════════════════════════════════════════════════════
// SFX — WEB AUDIO API (procédural, aucun fichier externe)
// ══════════════════════════════════════════════════════════════
class IslandSFX {
  constructor() {
    this.ctx     = null;
    this.enabled = true;
    this.nodes   = {};
  }

  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._buildOcean();
      this._buildWind();
      this._buildGulls();
      this._scheduleCrickets();
    } catch(e) { console.warn("Audio non disponible", e); }
  }

  // ── Vagues : bruit blanc filtré en boucle ─────────────────
  _buildOcean() {
    const ctx = this.ctx;
    const bufSize = ctx.sampleRate * 4;
    const buf  = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);

    // Bruit brun (intégration du bruit blanc) pour son grave des vagues
    let last = 0;
    for (let i = 0; i < bufSize; i++) {
      const white = Math.random()*2 - 1;
      data[i] = last = (last + .02*white) / 1.02;
    }
    // Normaliser
    const max = Math.max(...data.map(Math.abs));
    for (let i = 0; i < bufSize; i++) data[i] /= max;

    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop   = true;

    // Filtre passe-bas pour donner l'impression de vagues
    const lpf = ctx.createBiquadFilter();
    lpf.type            = "lowpass";
    lpf.frequency.value = 420;
    lpf.Q.value         = 0.8;

    // LFO pour faire monter/descendre le volume (rythme des vagues)
    const lfo    = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value  = 0.13;  // ~une vague toutes les 7.7s
    lfoGain.gain.value   = 0.35;

    const waveGain = ctx.createGain();
    waveGain.gain.value = 0.22;

    lfo.connect(lfoGain);
    lfoGain.connect(waveGain.gain);
    src.connect(lpf);
    lpf.connect(waveGain);
    waveGain.connect(ctx.destination);

    lfo.start();
    src.start();
    this.nodes.waveGain = waveGain;
  }

  // ── Vent : bruit blanc hautes fréquences, très doux ──────
  _buildWind() {
    const ctx = this.ctx;
    const bufSize = ctx.sampleRate * 6;
    const buf  = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random()*2 - 1;

    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop   = true;
    src.playbackRate.value = 0.7;

    const hpf = ctx.createBiquadFilter();
    hpf.type            = "bandpass";
    hpf.frequency.value = 900;
    hpf.Q.value         = 0.4;

    // LFO lent pour rafales
    const lfo     = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 0.04;
    lfoGain.gain.value  = 0.03;

    const windGain = ctx.createGain();
    windGain.gain.value = 0.04;

    lfo.connect(lfoGain);
    lfoGain.connect(windGain.gain);
    src.connect(hpf);
    hpf.connect(windGain);
    windGain.connect(ctx.destination);

    lfo.start();
    src.start();
    this.nodes.windGain = windGain;
  }

  // ── Mouettes : synthèse de cri ────────────────────────────
  _buildGulls() {
    this._scheduleGull();
  }

  _scheduleGull() {
    if (!this.enabled) { setTimeout(() => this._scheduleGull(), 5000); return; }
    const delay = 6000 + Math.random() * 12000;
    setTimeout(() => {
      if (this.ctx && this.enabled) this._playGull();
      this._scheduleGull();
    }, delay);
  }

  _playGull() {
    const ctx = this.ctx;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const now  = ctx.currentTime;

    osc.type = "sawtooth";
    // Glissement de fréquence vers le haut puis vers le bas = cri de mouette
    osc.frequency.setValueAtTime(600 + Math.random()*200, now);
    osc.frequency.linearRampToValueAtTime(900 + Math.random()*300, now + 0.15);
    osc.frequency.linearRampToValueAtTime(500 + Math.random()*100, now + 0.4);

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.06, now + 0.05);
    gain.gain.linearRampToValueAtTime(0.04, now + 0.3);
    gain.gain.linearRampToValueAtTime(0, now + 0.5);

    // Filtre pour adoucir
    const bpf = ctx.createBiquadFilter();
    bpf.type            = "bandpass";
    bpf.frequency.value = 800;
    bpf.Q.value         = 2;

    osc.connect(bpf);
    bpf.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.6);
  }

  // ── Grillons la nuit ──────────────────────────────────────
  _scheduleCrickets() {
    this._cricketLoop();
  }
  _cricketLoop() {
    setTimeout(() => {
      if (this.ctx && this.enabled && this.nodes.isNight) this._playCricket();
      this._cricketLoop();
    }, 800 + Math.random()*1200);
  }
  _playCricket() {
    const ctx = this.ctx;
    const now = ctx.currentTime;
    // Cri de grillon = salve de clics haute fréquence
    for (let i = 0; i < 3; i++) {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = 4200 + Math.random()*600;
      gain.gain.setValueAtTime(0, now + i*.04);
      gain.gain.linearRampToValueAtTime(0.018, now + i*.04 + .01);
      gain.gain.linearRampToValueAtTime(0, now + i*.04 + .03);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i*.04);
      osc.stop(now + i*.04 + .05);
    }
  }

  setDayTime(hours) {
    if (!this.ctx) return;
    const isNight = hours < 6 || hours >= 21;
    this.nodes.isNight = isNight;
    // Vent plus fort la nuit/dusk
    if (this.nodes.windGain) {
      const target = isNight ? 0.06 : (hours>17 ? 0.05 : 0.04);
      this.nodes.windGain.gain.setTargetAtTime(target, this.ctx.currentTime, 3);
    }
    // Vagues légèrement plus fortes le jour
    if (this.nodes.waveGain) {
      const target = isNight ? 0.16 : 0.22;
      this.nodes.waveGain.gain.setTargetAtTime(target, this.ctx.currentTime, 5);
    }
  }

  toggle() {
    if (!this.ctx) { this.init(); return; }
    this.enabled = !this.enabled;
    if (this.nodes.waveGain) this.nodes.waveGain.gain.setTargetAtTime(this.enabled ? 0.22 : 0, this.ctx.currentTime, 0.5);
    if (this.nodes.windGain) this.nodes.windGain.gain.setTargetAtTime(this.enabled ? 0.04 : 0, this.ctx.currentTime, 0.5);
    document.getElementById("sound-btn").textContent = this.enabled ? "🔊" : "🔇";
  }
}

const sfx = new IslandSFX();
window._sfx = sfx;

// Démarrage audio au premier clic (politique navigateurs)
const startAudio = () => {
  sfx.init();
  canvas.removeEventListener("click", startAudio);
  document.getElementById("sound-btn").removeEventListener("click", startAudio);
};
canvas.addEventListener("click", startAudio, { once: true });

document.getElementById("sound-btn").addEventListener("click", () => {
  if (!sfx.ctx) sfx.init();
  else sfx.toggle();
});

// ══════════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════════
let charRoot  = null;
let charBaseY = 0.14;

engine.runRenderLoop(() => {
  const t = performance.now() / 1000;
  if (charRoot && charRoot._idleAnim) {
    charRoot.position.y = charBaseY + Math.sin(t*1.4)*.025;
    charRoot.rotation.y = Math.sin(t*.22)*.18;
  }
  scene.render();
});
window.addEventListener("resize", () => engine.resize());

// ══════════════════════════════════════════════════════════════
// CHARGEMENT GLB
// ══════════════════════════════════════════════════════════════
(async () => {
  const importMesh = (folder, file, onProgress) => new Promise((resolve, reject) => {
    BABYLON.SceneLoader.ImportMesh("", folder, file, scene,
      (meshes, _ps, _sk, animGroups) => resolve({ meshes, animGroups }),
      onProgress || null,
      (sc, msg) => reject(new Error(msg))
    );
  });

  try {
    // ── VILLE ────────────────────────────────────────────────
    setProgress(50, "Chargement ville…");
    const city = await importMesh("./assets/", "simple_city_free.glb",
      evt => { if(evt.total) setProgress(50+(evt.loaded/evt.total)*18, "Ville…"); }
    );
    const cityRoot = city.meshes[0];
    cityRoot.scaling.setAll(0.145);
    cityRoot.position.set(0, 0.14, 0);
    city.meshes.forEach(m => {
      if (!m.name.includes("__root__")) {
        m.receiveShadows = true;
        shadow.addShadowCaster(m, true);
        waterMat.addToRenderList(m);
      }
    });
    setProgress(70, "Ville ✓");

    // ── ARBRES ───────────────────────────────────────────────
    setProgress(71, "Arbres…");
    const treeRes = await importMesh("./assets/", "three.glb");
    const treeTpl = treeRes.meshes[0];
    treeTpl.setEnabled(false);
    treeTpl.getChildMeshes().forEach(m => m.setEnabled(false));

    CFG.TREES.forEach(([x,z]) => {
      const y = getH(x,z);
      if (y < CFG.SAND_Y + 0.03) return;
      const clone = treeTpl.clone("tree_"+x+"_"+z);
      clone.getChildMeshes().forEach(m => {
        m.setEnabled(true);
        m.isPickable = false;
        m.receiveShadows = true;
        shadow.addShadowCaster(m, true);
        waterMat.addToRenderList(m);
      });
      clone.setEnabled(true);
      clone.scaling.setAll(0.14);
      clone.rotation.y = (x*7.3+z*3.1)%(Math.PI*2);
      clone.position.set(x, y, z);
    });
    setProgress(86, "Arbres ✓");

    // ── AVATAR ───────────────────────────────────────────────
    setProgress(87, "Avatar…");
    const avatarRes = await importMesh("./assets/", "free_avatar_for_iclone.glb");
    const avatarRootNode = avatarRes.meshes[0];
    avatarRootNode.scaling.setAll(0.022);
    charBaseY = 0.14;
    avatarRootNode.position.set(3.5, charBaseY, 6);
    avatarRootNode.rotation.y = -Math.PI * 0.6;
    avatarRootNode._idleAnim  = true;
    charRoot = avatarRootNode;

    avatarRes.meshes.forEach(m => {
      if (!m.name.includes("__root__")) {
        m.receiveShadows = true;
        shadow.addShadowCaster(m, true);
        waterMat.addToRenderList(m);
      }
    });

    setProgress(100, "Prêt ! 🏝️");

  } catch(err) {
    console.warn("Erreur GLB:", err);
    setProgress(100, "Chargement partiel");
  }

  // Masquer loading
  setTimeout(() => {
    const el = document.getElementById("loading");
    if (!el) return;
    el.style.opacity = "0";
    setTimeout(() => el.remove(), 900);
  }, 500);
})();

// Fallback 10s
setTimeout(() => {
  const el = document.getElementById("loading");
  if (el) { el.style.opacity="0"; setTimeout(()=>el.remove(),900); }
}, 10000);

</script>
